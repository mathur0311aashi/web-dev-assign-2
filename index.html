<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ---------- BODY ---------- */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #161E54, #2a3570);
            padding: 20px;
            color: #222;
        }

        /* ---------- CONTAINER ---------- */
        .container {
            max-width: 1300px;
            margin: auto;
        }

        /* ---------- HEADING ---------- */
        h1 {
            text-align: center;
            color: #f9fdff;
            margin-bottom: 25px;
        }

        /* ---------- FLEX LAYOUT ---------- */
        .parent-card {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        /* ---------- CARD (APPLIES TO ALL) ---------- */
        .card,
        .card1,
        .card2 {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            box-shadow: 0 4px 12px rgba(156, 48, 48, 0.15);
            transition: transform 0.2s ease;
        }

        .card:hover,
        .card1:hover,
        .card2:hover {
            transform: translateY(-3px);
        }

        /* ---------- INPUT SECTION ---------- */
        .input-group {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px 35px 10px 10px;
            border-radius: 6px;
            border: 2px solid #06b4f8;
            outline: none;
            transition: border 0.2s ease;
        }

        .input-group input:focus {
            border-color: #f0c1ad;
        }

        /* ---------- CLEAR (X) BUTTON ---------- */
        #clearInputBtn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #888;
            display: none;
        }

        #clearInputBtn:hover {
            color: #f9b396;
        }

        /* ---------- BUTTONS ---------- */
        button {
            padding: 10px 20px;
            background: #f85205;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #93310a;
        }

        /* ---------- HISTORY ---------- */
        .history {
            margin-top: 10px;
        }

        .history button {
            margin: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            background: #0d6080;
            color: #030b3a;
        }

        .history button:hover {
            background: #9fd3e6;
        }

        /* ---------- CLEAR HISTORY BUTTON ---------- */
        #clearHistoryBtn {
            margin-top: 10px;
        }

        /* ---------- WEATHER DISPLAY ---------- */
        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-left: 4px solid #ff4e02;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .weather-item label {
            font-weight: bold;
            color: #333;
        }

        /* ---------- MAP ---------- */
        /* Works for BOTH id and class */
        #mapbox,
        .mapbox {
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 12px;
            background: #eaeaea;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mapbox iframe,
        .mapbox iframe {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            border: 2px solid #075a7b;
        }

        /* ---------- CONSOLE (IF USED LATER) ---------- */
        .console {
            background: #161E54;
            color: #096e96;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 250px;
            overflow-y: auto;
        }

        .log.async {
            border-left: 3px solid #4d1904;
            padding-left: 6px;
        }

        .log.promise {
            border-left: 3px solid #2f1661;
            padding-left: 6px;
        }

        .log.callback {
            border-left: 3px solid #b861f3;
            padding-left: 6px;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 900px) {
            .parent-card {
                flex-direction: column;
            }

            .card,
            .card1,
            .card2 {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <!-- <div id="mapbox"></div> -->
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <span id="clearInputBtn">&times;</span>
                </div>
                <button id="searchBtn">Search</button>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
                <button id="clearHistoryBtn">Clear History</button>
            </div>

            <div class="card">
                <h3>Map</h3>
                <div id="mapbox"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

    <script>

        /* ---------- API KEY ---------- */
        const API_KEY = "e40e6cd9910df962e98a56ccfd788bdf";

        /* ---------- ELEMENTS ---------- */
        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        const cityInput = document.getElementById("cityInput");
        const mapbox = document.getElementById("mapbox");
        const clearBtn = document.getElementById("clearInputBtn");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );

            if (!res.ok) {
                throw new Error("City not found");
            }

            const data = await res.json();
            return data;
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {

            weatherBox.innerHTML = "<p>Loading...</p>";

            try {
                const data = await getWeather(city);

                renderWeather(data);
                renderMap(data.name);
                saveHistory(data.name);

            } catch (error) {

                weatherBox.innerHTML =
                    `<p style="color:red">${error.message}</p>`;

                mapbox.innerHTML = "";
            }
        }

        /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {

            const city = cityInput.value.trim();

            if (city !== "") {
                search(city);
            }
        };

        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {

            if (e.key === "Enter") {

                const city = cityInput.value.trim();

                if (city !== "") {
                    search(city);
                }
            }
        });

        /* ---------- WEATHER UI ---------- */
        function renderWeather(d) {

            weatherBox.innerHTML = `
            <div class="weather-item">
                <label>City</label>
                <span>${d.name}, ${d.sys.country}</span>
            </div>

            <div class="weather-item">
                <label>Temperature</label>
                <span>${d.main.temp} °C</span>
            </div>

            <div class="weather-item">
                <label>Weather</label>
                <span>${d.weather[0].main}</span>
            </div>

            <div class="weather-item">
                <label>Humidity</label>
                <span>${d.main.humidity}%</span>
            </div>

            <div class="weather-item">
                <label>Wind Speed</label>
                <span>${d.wind.speed} m/s</span>
            </div>
        `;
        }

        /* ---------- MAP ---------- */
        function renderMap(city) {

            mapbox.innerHTML = `
            <iframe
                width="100%"
                height="300"
                style="border:0"
                loading="lazy"
                allowfullscreen
                referrerpolicy="no-referrer-when-downgrade"
                src="https://www.google.com/maps?q=${encodeURIComponent(city)}&output=embed">
            </iframe>
        `;
        }

        /* ---------- SAVE HISTORY ---------- */
        function saveHistory(city) {

            let history =
                JSON.parse(localStorage.getItem("weatherHistory")) || [];

            if (!history.includes(city)) {

                history.push(city);

                localStorage.setItem(
                    "weatherHistory",
                    JSON.stringify(history)
                );

                showHistory();
            }
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {

            let history =
                JSON.parse(localStorage.getItem("weatherHistory")) || [];

            historyBox.innerHTML = "";

            history.forEach(city => {

                const item = document.createElement("div");

                item.style.display = "inline-flex";
                item.style.alignItems = "center";
                item.style.margin = "5px";

                const btn = document.createElement("button");
                btn.textContent = city;

                btn.onclick = () => search(city);

                const cross = document.createElement("span");

                cross.innerHTML = "&times;";
                cross.style.cursor = "pointer";
                cross.style.marginLeft = "8px";
                cross.style.color = "red";
                cross.style.fontWeight = "bold";

                cross.onclick = () => {

                    history = history.filter(c => c !== city);

                    localStorage.setItem(
                        "weatherHistory",
                        JSON.stringify(history)
                    );

                    showHistory();
                };

                item.appendChild(btn);
                item.appendChild(cross);

                historyBox.appendChild(item);
            });
        }

        /* ---------- CLEAR HISTORY ---------- */
        document.getElementById("clearHistoryBtn").onclick = () => {

            localStorage.removeItem("weatherHistory");

            historyBox.innerHTML = "";

            alert("Search history cleared!");
        };

        /* ---------- CLEAR INPUT ---------- */
        cityInput.addEventListener("input", () => {

            clearBtn.style.display =
                cityInput.value ? "block" : "none";
        });

        clearBtn.onclick = () => {

            cityInput.value = "";

            clearBtn.style.display = "none";

            cityInput.focus();

            weatherBox.innerHTML = "";
            mapbox.innerHTML = "";
        };

        /* ---------- INITIAL LOAD ---------- */
        showHistory();

    </script>
</body>

</html>
